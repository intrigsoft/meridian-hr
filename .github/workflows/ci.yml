name: CI

on:
  push:
    branches: [production]
  pull_request:
    branches: [production]

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build app
        run: ./gradlew build --no-daemon

  adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build adapter
        run: cd mcp-adapter && npm ci --no-audit --no-fund && npm run build
