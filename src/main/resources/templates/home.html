<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meridian HR</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', system-ui, sans-serif; background: #eceff3; color: #1e2733; margin: 0; padding: 48px; }
        .card { max-width: 560px; margin: 0 auto; background: #fff; border: 1px solid #e4e8ed; border-radius: 14px; padding: 28px 30px; }
        h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
        .muted { color: #8894a3; font-size: 13px; }
        .row { display: flex; gap: 12px; align-items: center; margin: 18px 0; }
        .avatar { width: 46px; height: 46px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; }
        .pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #e8eefb; color: #3a5aa8; }
        .note { margin-top: 20px; padding: 12px 14px; background: #f8fafc; border: 1px solid #eef1f4; border-radius: 10px; font-size: 12.5px; color: #6b7480; line-height: 1.5; }
        .actions { display: flex; gap: 10px; margin-top: 22px; }
        button { font-family: inherit; font-size: 13px; font-weight: 600; height: 38px; padding: 0 16px; border-radius: 9px; cursor: pointer; }
        .primary { background: #17457f; color: #fff; border: none; }
        .ghost { background: #fff; color: #5a6472; border: 1px solid #dde2e8; }
    </style>
</head>
<body>
<div class="card">
    <h1>Meridian HR</h1>
    <div class="muted">Phase 1 checkpoint — session &amp; workspace wired. The AppShell and real screens land next.</div>

    <div class="row" th:if="${user}">
        <div class="avatar" th:text="${user.initials}" th:styleappend="'; ' + ('background:' + ${user.avatarBg})">SC</div>
        <div style="flex:1;">
            <div style="font-weight:600;" th:text="${user.fullName()}">Sarah Chen</div>
            <div class="muted" th:text="${user.title} + ' · ' + ${user.dept}">Product Designer · Design</div>
        </div>
        <span class="pill" th:text="${user.accessRole.label}">Employee</span>
    </div>

    <div class="note">
        Signed in as <strong th:text="${user.email}">sarah.chen@meridian.co</strong>.
        This device sees an isolated demo workspace of
        <strong th:text="${headcount}">15</strong> employees, seeded fresh. Reset restores it to seed.
    </div>

    <div class="actions">
        <form method="post" action="/logout"><button class="ghost" type="submit">Sign out</button></form>
        <form method="post" action="/reset"><button class="primary" type="submit">Start fresh (reset)</button></form>
    </div>
</div>
</body>
</html>
