<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title layout:fragment="title">Org structure · Meridian HR</title>
</head>
<body>
<div layout:fragment="content" style="max-width:900px;">

    <div style="margin-bottom:18px;">
        <div style="font-size:12.5px; color:#8894a3; font-weight:500; margin-bottom:2px;">Admin / Org structure</div>
        <h1 style="margin:0; font-size:24px; font-weight:700; letter-spacing:-0.02em; color:#1a2331;">Departments, levels &amp; bands</h1>
    </div>

    <div th:unless="${isHr}" style="background:#f7f9fb; border:1px dashed #d9e0e8; border-radius:13px; padding:56px 20px; text-align:center;">
        <div style="font-size:15px; font-weight:600; color:#5a6472;">HR access required</div>
        <div style="font-size:12.5px; color:#9aa3ad; margin-top:4px;">Only People Ops can view the org taxonomy.</div>
    </div>

    <th:block th:if="${isHr}">
        <!-- Departments -->
        <div style="background:#fff; border:1px solid #e4e8ed; border-radius:12px; overflow:hidden; margin-bottom:16px;">
            <div style="padding:14px 20px; border-bottom:1px solid #eef1f4; font-size:14px; font-weight:700; color:#1a2331;">Departments</div>
            <div th:each="d : ${depts}" style="display:flex; align-items:center; gap:12px; padding:13px 20px; border-bottom:1px solid #f4f6f8;">
                <span style="width:12px; height:12px; border-radius:4px; flex-shrink:0;" th:styleappend="'; ' + ('background:' + ${d.color()})"></span>
                <div style="flex:1; min-width:0;">
                    <div style="font-size:13.5px; font-weight:600; color:#28323f;" th:text="${d.name()}">Engineering</div>
                    <div style="font-size:11.5px; color:#8894a3;" th:text="'Lead: ' + ${d.lead()}">Lead: David Okonkwo</div>
                </div>
                <span style="font-size:11px; font-weight:700; color:#5a6472; background:#eef1f4; padding:3px 10px; border-radius:20px;" th:text="${d.count()} + ' people'">5 people</span>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1.4fr; gap:16px;">
            <!-- Levels -->
            <div style="background:#fff; border:1px solid #e4e8ed; border-radius:12px; padding:18px 20px;">
                <div style="font-size:14px; font-weight:700; color:#1a2331; margin-bottom:12px;">Levels</div>
                <div style="display:flex; flex-direction:column; gap:6px;">
                    <div th:each="l, it : ${levels}" style="display:flex; align-items:center; gap:10px; font-size:12.5px; color:#28323f;">
                        <span style="width:22px; height:22px; border-radius:6px; background:#eef1f4; color:#6b7480; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center;" th:text="${it.count}">1</span>
                        <span style="font-weight:600;" th:text="${l}">Junior</span>
                    </div>
                </div>
            </div>

            <!-- Comp bands -->
            <div style="background:#fff; border:1px solid #e4e8ed; border-radius:12px; padding:18px 20px;">
                <div style="font-size:14px; font-weight:700; color:#1a2331; margin-bottom:12px;">Comp bands</div>
                <div th:each="b : ${bands}" style="display:flex; align-items:center; gap:12px; padding:7px 0; border-bottom:1px solid #f4f6f8;">
                    <span style="font-size:11.5px; font-weight:700; color:#3a4453; font-family:var(--mono); width:34px;" th:text="${b.id}">IC3</span>
                    <span style="flex:1; font-size:12.5px; color:#28323f;" th:text="${b.label}">Senior IC</span>
                    <span style="font-size:11.5px; color:#8894a3; font-family:var(--mono);" th:text="'$' + ${#numbers.formatInteger(b.min, 0, 'COMMA')} + ' – $' + ${#numbers.formatInteger(b.max, 0, 'COMMA')}">$112,000 – $145,000</span>
                </div>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
