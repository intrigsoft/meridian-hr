<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title layout:fragment="title">My Leave · Meridian HR</title>
    <th:block layout:fragment="head">
        <style>.lv-row:hover { background: #fafbfc; }</style>
    </th:block>
</head>
<body>
<div layout:fragment="content" style="max-width:940px;">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:22px;">
        <div>
            <div style="font-size:12.5px; color:#8894a3; font-weight:500; margin-bottom:2px;">Workspace / Leave</div>
            <h1 style="margin:0; font-size:24px; font-weight:700; letter-spacing:-0.02em; color:#1a2331;">My Leave</h1>
        </div>
        <a th:href="@{/leave/new}" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            New leave request
        </a>
    </div>

    <!-- Balance tiles -->
    <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin-bottom:24px;">
        <div th:each="b : ${balances}" style="background:#fff; border:1px solid #e4e8ed; border-radius:10px; padding:16px;">
            <div style="display:flex; align-items:center; gap:7px; margin-bottom:10px;">
                <span style="width:9px; height:9px; border-radius:3px;" th:styleappend="'; ' + ('background:' + ${b.color()})"></span>
                <span style="font-size:12px; font-weight:600; color:#6b7480;" th:text="${b.label()}">Annual</span>
            </div>
            <div style="font-size:26px; font-weight:700; color:#1a2331; line-height:1;"><span th:text="${b.value()}">12.5</span><span style="font-size:13px; font-weight:500; color:#9aa3ad;" th:text="' ' + ${b.unit()}">days</span></div>
            <div style="height:5px; border-radius:3px; background:#eef1f4; margin-top:11px; overflow:hidden;"><div style="height:100%; border-radius:3px;" th:styleappend="'; ' + ('width:' + ${b.pct()} + '; background:' + ${b.color()})"></div></div>
            <div style="font-size:11.5px; color:#9aa3ad; margin-top:7px;" th:text="${b.sub()}">12.5 of 25 used</div>
        </div>
    </div>

    <!-- Request history -->
    <div style="background:#fff; border:1px solid #e4e8ed; border-radius:10px; overflow:hidden;">
        <div style="display:flex; align-items:center; gap:6px; padding:12px 16px; border-bottom:1px solid #eef1f4;">
            <a th:each="t : ${ {{'all','All'},{'pending','Pending'},{'approved','Approved'},{'rejected','Rejected'}} }"
               th:href="@{/leave(tab=${t[0]}, type=${typeFilter})}"
               th:styleappend="${t[0] == tab} ? 'background:#eaf1fa; color:#17457f;' : 'background:transparent; color:#6b7480;'"
               style="height:30px; padding:0 13px; border-radius:7px; font-size:12.5px; font-weight:600; display:flex; align-items:center;">
                <span th:text="${t[1]}">All</span>
                <span style="opacity:0.6; margin-left:5px;" th:switch="${t[0]}"><span th:case="'all'" th:text="${counts.all()}">0</span><span th:case="'pending'" th:text="${counts.pending()}">0</span><span th:case="'approved'" th:text="${counts.approved()}">0</span><span th:case="'rejected'" th:text="${counts.rejected()}">0</span></span>
            </a>
            <div style="flex:1;"></div>
            <form method="get" action="/leave">
                <input type="hidden" name="tab" th:value="${tab}"/>
                <select name="type" onchange="this.form.submit()" style="height:30px; border:1px solid #dde2e8; border-radius:7px; background:#fff; padding:0 8px; font-size:12.5px; font-weight:600; color:#5a6472; cursor:pointer;">
                    <option value="all" th:selected="${typeFilter == 'all'}">All types</option>
                    <option th:each="ltype : ${leaveTypes}" th:value="${ltype.id()}" th:text="${ltype.shortLabel()}" th:selected="${ltype.id() == typeFilter}">Annual</option>
                </select>
            </form>
        </div>

        <!-- Table header -->
        <div style="display:grid; grid-template-columns:1.4fr 1.5fr 0.8fr 1.2fr 1.2fr 1fr; gap:12px; padding:10px 18px; background:#f8fafc; border-bottom:1px solid #eef1f4; font-size:11px; font-weight:700; color:#8894a3; text-transform:uppercase; letter-spacing:0.04em;">
            <div>Type</div><div>Dates</div><div>Days</div><div>Submitted</div><div>Approver</div><div>Status</div>
        </div>

        <a th:each="r : ${rows}" th:href="@{/leave(tab=${tab}, type=${typeFilter}, req=${r.id()})}" class="lv-row"
           style="display:grid; grid-template-columns:1.4fr 1.5fr 0.8fr 1.2fr 1.2fr 1fr; gap:12px; padding:14px 18px; border-bottom:1px solid #f1f4f7; align-items:center;">
            <div style="display:flex; align-items:center; gap:10px;">
                <span style="width:8px; height:8px; border-radius:2px;" th:styleappend="'; ' + ('background:' + ${r.dot()})"></span>
                <span style="font-size:13.5px; font-weight:600; color:#28323f;" th:text="${r.type()}">Annual leave</span>
            </div>
            <div style="font-size:13px; color:#4a5563;" th:text="${r.dates()}">Sep 29 – Oct 3</div>
            <div style="font-size:13px; color:#4a5563;" th:text="${r.days()}">5</div>
            <div style="font-size:13px; color:#8894a3;" th:text="${r.submitted()}">Jun 28</div>
            <div style="display:flex; align-items:center; gap:7px;">
                <div style="width:22px; height:22px; border-radius:50%; color:#fff; font-size:9.5px; font-weight:600; display:flex; align-items:center; justify-content:center;" th:styleappend="'; ' + ('background:' + ${r.apprBg()})" th:text="${r.apprInit()}">DO</div>
                <span style="font-size:12.5px; color:#4a5563;" th:text="${r.approver()}">D. Okonkwo</span>
            </div>
            <div><span style="font-size:11.5px; font-weight:600; padding:4px 10px; border-radius:20px;" th:styleappend="'; ' + ('background:' + ${r.pillBg()} + '; color:' + ${r.pillFg()})" th:text="${r.status()}">Pending</span></div>
        </a>
        <div th:if="${rows.isEmpty()}" style="padding:36px; text-align:center; font-size:12.5px; color:#9aa3ad;">No requests in this view.</div>
    </div>
</div>

<th:block layout:fragment="content-after">
    <!-- th:replace has HIGHER precedence than th:if, so the guard MUST be on an outer element -->
    <th:block th:if="${drawerOpen and dr != null}">
        <th:block th:replace="~{fragments/request-drawer :: drawer(${dr})}"></th:block>
    </th:block>
    <th:block th:replace="~{fragments/request-drawer :: toast}"></th:block>
</th:block>
</body>
</html>
