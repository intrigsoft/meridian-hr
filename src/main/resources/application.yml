server:
  # Railway/containers inject PORT; local dev defaults to 3020 to avoid clashing
  # with the hub (3333) and admin portal (7001).
  port: ${PORT:3020}
  servlet:
    session:
      # Cookie-only session tracking — never rewrite ;jsessionid into redirect URLs.
      tracking-modes: cookie

spring:
  application:
    name: meridian-hr
  thymeleaf:
    # Server-rendered; disable template caching in dev for fast iteration.
    cache: ${THYMELEAF_CACHE:false}

meridian:
  # Demo-workspace bounds (in-memory, no DB). See WorkspaceStore.
  workspace:
    idle-ttl: ${MERIDIAN_WORKSPACE_IDLE_TTL:PT2H}   # evict a workspace after 2h idle
    max-devices: ${MERIDIAN_WORKSPACE_MAX_DEVICES:2000}
    sweep-interval: ${MERIDIAN_WORKSPACE_SWEEP_INTERVAL:300000}  # scheduled sweep, ms (5 min)
  # Embedded Dioschub assistant. Empty until the AI-integration phase (rail stays inert).
  diosc:
    hub-url: ${MERIDIAN_DIOSC_HUB_URL:}
    embed-key: ${MERIDIAN_DIOSC_EMBED_KEY:}
    assistant-id: ${MERIDIAN_DIOSC_ASSISTANT_ID:}
    bind-endpoint: ${MERIDIAN_DIOSC_BIND_ENDPOINT:/api/diosc/bind}
    # Secret hub admin API key with scope auth:bind — server-to-server only.
    bind-key: ${MERIDIAN_DIOSC_BIND_KEY:}

logging:
  level:
    com.meridian.hr: INFO
