<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: 'Public Sans', system-ui, -apple-system, sans-serif; background: #eceff3; color: #1e2733; -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #cdd4dc; border-radius: 6px; border: 2px solid #eceff3; }
</style>
</helmet>

<dc-import name="AppShell" active="leave" note-title="Pay period ends" note-sub="Jul 15, 2026 · 13 days" hint-size="100%,100%">
      <div style="max-width:940px;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:22px;">
          <div>
            <div style="font-size:12.5px; color:#8894a3; font-weight:500; margin-bottom:2px;">Workspace / Leave</div>
            <h1 style="margin:0; font-size:24px; font-weight:700; letter-spacing:-0.02em; color:#1a2331;">My Leave</h1>
          </div>
          <a href="New Leave Request.dc.html" style="display:flex; align-items:center; gap:8px; height:38px; padding:0 16px; background:#17457f; color:#fff; border-radius:8px; font-size:13.5px; font-weight:600;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            New leave request
          </a>
        </div>

        <!-- Balance tiles -->
        <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin-bottom:24px;">
          <sc-for list="{{ balances }}" as="b" hint-placeholder-count="4">
            <div style="background:#fff; border:1px solid #e4e8ed; border-radius:10px; padding:16px;">
              <div style="display:flex; align-items:center; gap:7px; margin-bottom:10px;">
                <span style="width:9px; height:9px; border-radius:3px; background:{{ b.color }};"></span>
                <span style="font-size:12px; font-weight:600; color:#6b7480;">{{ b.label }}</span>
              </div>
              <div style="font-size:26px; font-weight:700; color:#1a2331; line-height:1;">{{ b.value }}<span style="font-size:13px; font-weight:500; color:#9aa3ad;"> {{ b.unit }}</span></div>
              <div style="height:5px; border-radius:3px; background:#eef1f4; margin-top:11px; overflow:hidden;"><div style="height:100%; width:{{ b.pct }}; background:{{ b.color }}; border-radius:3px;"></div></div>
              <div style="font-size:11.5px; color:#9aa3ad; margin-top:7px;">{{ b.sub }}</div>
            </div>
          </sc-for>
        </div>

        <!-- Request history -->
        <div style="background:#fff; border:1px solid #e4e8ed; border-radius:10px; overflow:hidden;">
          <div style="display:flex; align-items:center; gap:6px; padding:12px 16px; border-bottom:1px solid #eef1f4;">
            <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
              <button onClick="{{ t.onClick }}" style="height:30px; padding:0 13px; border:none; border-radius:7px; font-family:inherit; font-size:12.5px; font-weight:600; cursor:pointer; background:{{ t.bg }}; color:{{ t.fg }};">{{ t.label }}<span style="opacity:0.6; margin-left:5px;">{{ t.count }}</span></button>
            </sc-for>
            <div style="flex:1;"></div>
            <div style="position:relative;">
              <button onClick="{{ onToggleFilter }}" style="display:flex; align-items:center; gap:6px; height:30px; padding:0 12px; border:1px solid {{ filterBtnBorder }}; border-radius:7px; background:{{ filterBtnBg }}; font-family:inherit; font-size:12.5px; font-weight:600; color:{{ filterBtnFg }}; cursor:pointer;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H3l7 8.5V19l4 2v-8.5L21 4z"/></svg>
                {{ filterLabel }}
              </button>
              <sc-if value="{{ filterOpen }}" hint-placeholder-val="">
                <div style="position:absolute; right:0; top:36px; z-index:30; width:196px; background:#fff; border:1px solid #e4e8ed; border-radius:9px; box-shadow:0 12px 32px rgba(20,30,50,0.14); padding:5px;">
                  <sc-for list="{{ typeFilters }}" as="tf" hint-placeholder-count="0">
                    <button onClick="{{ tf.onClick }}" style="display:flex; align-items:center; gap:9px; width:100%; padding:8px 10px; border:none; border-radius:7px; background:{{ tf.bg }}; font-family:inherit; font-size:12.5px; font-weight:600; color:{{ tf.fg }}; cursor:pointer; text-align:left;">
                      <span style="width:9px; height:9px; border-radius:3px; background:{{ tf.dot }}; flex-shrink:0;"></span>
                      <span style="flex:1;">{{ tf.label }}</span>
                      <sc-if value="{{ tf.active }}" hint-placeholder-val=""><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#17457f" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg></sc-if>
                    </button>
                  </sc-for>
                </div>
              </sc-if>
            </div>
          </div>

          <!-- Table header -->
          <div style="display:grid; grid-template-columns:1.4fr 1.5fr 0.8fr 1.2fr 1.2fr 1fr; gap:12px; padding:10px 18px; background:#f8fafc; border-bottom:1px solid #eef1f4; font-size:11px; font-weight:700; color:#8894a3; text-transform:uppercase; letter-spacing:0.04em;">
            <div>Type</div><div>Dates</div><div>Days</div><div>Submitted</div><div>Approver</div><div>Status</div>
          </div>

          <sc-for list="{{ rows }}" as="r" hint-placeholder-count="6">
            <div onClick="{{ r.onOpen }}" style="display:grid; grid-template-columns:1.4fr 1.5fr 0.8fr 1.2fr 1.2fr 1fr; gap:12px; padding:14px 18px; border-bottom:1px solid #f1f4f7; align-items:center; cursor:pointer;" style-hover="background:#fafbfc;">
              <div style="display:flex; align-items:center; gap:10px;">
                <span style="width:8px; height:8px; border-radius:2px; background:{{ r.dot }};"></span>
                <span style="font-size:13.5px; font-weight:600; color:#28323f;">{{ r.type }}</span>
              </div>
              <div style="font-size:13px; color:#4a5563;">{{ r.dates }}</div>
              <div style="font-size:13px; color:#4a5563;">{{ r.days }}</div>
              <div style="font-size:13px; color:#8894a3;">{{ r.submitted }}</div>
              <div style="display:flex; align-items:center; gap:7px;">
                <div style="width:22px; height:22px; border-radius:50%; background:{{ r.apprBg }}; color:#fff; font-size:9.5px; font-weight:600; display:flex; align-items:center; justify-content:center;">{{ r.apprInit }}</div>
                <span style="font-size:12.5px; color:#4a5563;">{{ r.approver }}</span>
              </div>
              <div><span style="font-size:11.5px; font-weight:600; padding:4px 10px; border-radius:20px; background:{{ r.pillBg }}; color:{{ r.pillFg }};">{{ r.status }}</span></div>
            </div>
          </sc-for>
        </div>

        <dc-import name="Request Drawer" request="{{ selectedRequest }}" viewer="{{ user }}" open="{{ drawerOpen }}" on-close="{{ onDrawerClose }}" on-withdraw="{{ onWithdraw }}" hint-size="0,0"></dc-import>

        <div style="position:fixed; right:22px; bottom:22px; display:flex; flex-direction:column; gap:10px; z-index:200;">
          <sc-for list="{{ toasts }}" as="t" hint-placeholder-count="0">
            <div style="display:flex; align-items:center; gap:11px; background:#1a2331; color:#fff; padding:12px 14px; border-radius:10px; box-shadow:0 10px 28px rgba(20,30,50,0.28); min-width:270px;">
              <span style="width:8px; height:8px; border-radius:50%; background:{{ t.dot }}; flex-shrink:0;"></span>
              <span style="flex:1; font-size:13px; font-weight:500;">{{ t.msg }}</span>
              <sc-if value="{{ t.hasUndo }}" hint-placeholder-val="">
                <button onClick="{{ t.onUndo }}" style="border:none; background:transparent; color:#8fb8ff; font-family:inherit; font-size:12.5px; font-weight:700; cursor:pointer; padding:0;">Undo</button>
              </sc-if>
              <button onClick="{{ t.onClose }}" style="border:none; background:transparent; color:#8894a3; font-size:16px; line-height:1; cursor:pointer; padding:0;">×</button>
            </div>
          </sc-for>
        </div>
      </div>
</dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { user: null, tab: "all", typeFilter: "all", filterOpen: false, selectedId: null, drawerOpen: false, toasts: [] };
  _tid = 0;

  componentDidMount() {
    Promise.all([import("./session.js"), import("./leave-store.js")]).then(([m, store]) => {
      this._m = m; this._store = store;
      const user = m.requireSession();
      if (user) this.setState({ user });
    });
  }

  addToast(msg, opts) {
    const id = ++this._tid;
    const t = { id, msg, dot: (opts && opts.dot) || "#3ecf8e", hasUndo: !!(opts && opts.onUndo), _undo: opts && opts.onUndo };
    this.setState((s) => ({ toasts: [...s.toasts, t] }));
    setTimeout(() => this.removeToast(id), (opts && opts.duration) || 4200);
  }
  removeToast(id) { this.setState((s) => ({ toasts: s.toasts.filter((t) => t.id !== id) })); }

  openDrawer(id) { this.setState({ selectedId: id, drawerOpen: true }); }
  closeDrawer() { this.setState({ drawerOpen: false }); }

  withdraw() {
    const id = this.state.selectedId, u = this.state.user;
    if (!id || !this._store) return;
    this._store.cancelRequest(id, u.id, u.name);
    this.setState({ drawerOpen: false });
    this.addToast("Request withdrawn", { dot: "#8894a3" });
  }

  renderVals() {
    const u = this.state.user;
    if (!u) return { balances: [], tabs: [], rows: [], typeFilters: [], toasts: [], drawerOpen: false, filterOpen: false, filterLabel: "Filter" };

    const balances = [
      { label: "Annual", value: "12.5", unit: "days", pct: "50%", sub: "12.5 of 25 used", color: "#3f7cc4" },
      { label: "Sick", value: "8", unit: "days", pct: "20%", sub: "2 of 10 used", color: "#5aa17f" },
      { label: "Personal", value: "3", unit: "days", pct: "0%", sub: "0 of 3 used", color: "#c99b4e" },
      { label: "Carryover", value: "2", unit: "days", pct: "60%", sub: "expires Mar 31", color: "#9b7fc4" },
    ];

    const store = this._store;
    const all = !store ? [] : store.forEmployee(u.id).map((r) => {
      const tm = store.TYPE_META[r.type] || {};
      const sm = store.STATUS_META[r.status] || {};
      const ap = store.APPROVERS[r.approverId] || { name: "—", init: "—", bg: "#c7cdd6" };
      return {
        id: r.id, typeKey: r.type,
        type: tm.label || r.type, dot: tm.dot || "#8894a3",
        dates: store.formatRange(r.startDate, r.endDate),
        days: String(r.days), submitted: r.submitted,
        approver: ap.name, apprInit: ap.init, apprBg: ap.bg,
        status: sm.label || r.status, pillBg: sm.pillBg, pillFg: sm.pillFg, cat: sm.cat || "pending",
        onOpen: () => this.openDrawer(r.id),
      };
    });

    const counts = { all: all.length, pending: all.filter(r => r.cat === "pending").length, approved: all.filter(r => r.cat === "approved").length, rejected: all.filter(r => r.cat === "rejected").length };
    const tabDefs = [["all", "All"], ["pending", "Pending"], ["approved", "Approved"], ["rejected", "Rejected"]];
    const tabs = tabDefs.map(([id, label]) => ({
      label, count: counts[id],
      bg: this.state.tab === id ? "#eaf1fa" : "transparent",
      fg: this.state.tab === id ? "#17457f" : "#6b7480",
      onClick: () => this.setState({ tab: id }),
    }));

    const byTab = this.state.tab === "all" ? all : all.filter(r => r.cat === this.state.tab);
    const tf = this.state.typeFilter;
    const rows = tf === "all" ? byTab : byTab.filter(r => r.typeKey === tf);

    const typeDefs = [["all", "All types", "#c7cdd6"], ["annual", "Annual", "#3f7cc4"], ["sick", "Sick", "#5aa17f"], ["personal", "Personal", "#c99b4e"], ["parental", "Parental", "#9b7fc4"], ["unpaid", "Unpaid", "#8894a3"], ["bereavement", "Bereavement", "#b56b8f"]];
    const typeFilters = typeDefs.map(([id, label, dot]) => ({
      label, dot, active: tf === id,
      bg: tf === id ? "#eaf1fa" : "transparent",
      fg: tf === id ? "#17457f" : "#4a5563",
      onClick: () => this.setState({ typeFilter: id, filterOpen: false }),
    }));
    const filterActive = tf !== "all";
    const selectedRequest = (store && this.state.selectedId) ? store.getRequest(this.state.selectedId) : null;
    const toasts = this.state.toasts.map((t) => ({ ...t, onClose: () => this.removeToast(t.id), onUndo: () => { if (t._undo) t._undo(); this.removeToast(t.id); } }));

    return {
      balances, tabs, rows,
      typeFilters,
      filterOpen: this.state.filterOpen,
      onToggleFilter: () => this.setState({ filterOpen: !this.state.filterOpen }),
      filterLabel: filterActive ? (typeDefs.find(d => d[0] === tf) || [])[1] : "Filter",
      filterBtnBg: filterActive ? "#eaf1fa" : "#fff",
      filterBtnBorder: filterActive ? "#bcd0ea" : "#dde2e8",
      filterBtnFg: filterActive ? "#17457f" : "#5a6472",
      user: u,
      selectedRequest,
      drawerOpen: this.state.drawerOpen && !!selectedRequest,
      onDrawerClose: () => this.closeDrawer(),
      onWithdraw: () => this.withdraw(),
      toasts,
    };
  }
}
</script>
</body>
</html>
